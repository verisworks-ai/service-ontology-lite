name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    uses: verisworks-ai/.github/.github/workflows/security-baseline.yml@main
    with:
      language: python

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff build

      - name: Compile
        run: python -m compileall -q src tests

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest -q

      - name: Build package
        run: python -m build --sdist --wheel

      - name: Default host safety check
        run: |
          python -c "
          import pathlib, sys
          server_file = pathlib.Path('src/service_ontology_lite/mcp_http_server.py')
          if not server_file.exists():
              sys.exit(0)
          src = server_file.read_text()
          if '\"0.0.0.0\"' in src and 'default=\"0.0.0.0\"' in src:
              print('::error::mcp_http_server default host is 0.0.0.0 — should be 127.0.0.1')
              sys.exit(1)
          print('host default: OK')
          "
